    <!-- Pre-hydration theme resolution: read the persisted choice before first paint so there is
         no dark/light flash. Kept as an inline script (not a module) so it runs synchronously
         ahead of the stylesheet and the React bundle. -->
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('portfolio-theme');
          var theme = saved === 'light' ? 'light' : 'dark';
          document.documentElement.setAttribute('data-theme', theme);
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      })();
    </script>

      gtag('js', new Date());
      gtag('config', 'G-YMWDE0VTD3');
